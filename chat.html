<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Chat – Kisan Sathi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
  <script src="krishimitra.js" defer></script>
</head>
<body data-page="chat">
  <div class="app-shell">
    <header class="app-header simple">
      <button class="back-btn" onclick="navigateTo('index.html')">←</button>
      <div>
        <h1 class="app-title">AI Farming Assistant</h1>
        <p class="app-subtitle">Ask anything about your farm</p>
      </div>
    </header>

    <main class="app-main chat-main scrollable">
      <section class="chat-quick-actions">
        <button class="chip" onclick="chatQuick('Show government schemes for small farmers')">
          Show Govt Schemes
        </button>
        <button class="chip" onclick="chatQuick('I see yellow spots on my crop leaves')">
          Crop Disease Help
        </button>
        <button class="chip" onclick="chatQuick('Today market price of wheat')">
          Market Prices
        </button>
      </section>

      <section class="chat-window" id="chatWindow">
        <div class="chat-bubble bot">
          Namaste! I am your farming assistant. Ask me questions in simple language like:
          “Best fertilizer for wheat?”, “When to sow paddy?”, or “How to control pests?”
        </div>
      </section>
    </main>

    <footer class="chat-input-bar">
      <label class="icon-btn upload">
        📷
        <input type="file" accept="image/*" id="chatImageInput" onchange="handleChatImageUpload(event)" hidden />
      </label>

      <div class="chat-input-wrapper">
        <input
          type="text"
          id="chatInput"
          placeholder="Type your question in any language..."
        />
      </div>

      <button class="icon-btn mic"id="voiceBtn" onclick="startVoiceInput()">🎙️
      </button>

      <button class="icon-btn send" onclick="sendChatMessage()">
        ➤
      </button>
    </footer>

    <nav class="bottom-nav">
      <button class="nav-item" onclick="navigateTo('index.html')">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item active" onclick="navigateTo('chat.html')">
        <span class="nav-icon">🤖</span>
        <span class="nav-label">AI Chat</span>
      </button>
      <button class="nav-item" onclick="navigateTo('crops.html')">
        <span class="nav-icon">🌾</span>
        <span class="nav-label">Crops</span>
      </button>
      <button class="nav-item" onclick="navigateTo('schemes.html')">
        <span class="nav-icon">🏛️</span>
        <span class="nav-label">Schemes</span>
      </button>
      <button class="nav-item" onclick="navigateTo('profile.html')">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
      </button>
    </nav>
  </div>
</body>
</html>
